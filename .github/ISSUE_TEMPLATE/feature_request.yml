name: Feature request
description: Propose a new capability or enhancement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach (if you have one)
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - io (TCR-seq / neoantigen / HLA parsing)
        - structure (prediction backends)
        - scoring
        - self_antigen
        - wetlab
        - CI/CD, containers
        - docs
        - other
    validations:
      required: true
