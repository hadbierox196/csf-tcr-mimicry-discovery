name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Bump this to force-invalidate the pip cache below if dependency
  # resolution ever gets into a weird state.
  PIP_CACHE_VERSION: v1

jobs:
  # ---------------------------------------------------------------------
  # Each check below is its own job (not a step inside one big job) on
  # purpose: GitHub renders one pass/fail status check per job, so a
  # failure points a reviewer straight at "Lint" or "Type-check" or
  # "Unit tests (py3.12)" instead of a single opaque "CI failed".
  # ---------------------------------------------------------------------

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: pip install ruff>=0.4

      - name: ruff check (lint rules)
        run: ruff check . --output-format=github

      - name: ruff format --check (style)
        run: ruff format --check .

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: pip install -e ".[dev]"

      - name: mypy mimicry_discovery
        run: mypy mimicry_discovery --show-error-codes --pretty

  test:
    name: Unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: >
          pytest tests/unit -v
          --cov=mimicry_discovery --cov-report=term-missing --cov-report=xml
          --junitxml=junit-${{ matrix.python-version }}.xml

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-py${{ matrix.python-version }}
          path: junit-${{ matrix.python-version }}.xml

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  smoke-test:
    name: Smoke test (integration, synthetic fixtures)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: pip install -e ".[dev]"

      - name: Verify the CLI entry point installs correctly
        run: mimicry-discovery --help

      - name: Run end-to-end smoke test against bundled synthetic fixtures
        run: pytest tests/integration -v
